<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stoic Thoughts</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg:          #090805;
            --surface:     #100e0a;
            --text:        #c4a882;
            --text-dim:    #6b5a42;
            --text-muted:  #38302a;
            --accent:      #9a7a52;
            --glow:        rgba(180, 130, 60, 0.055);
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif;
            overflow: hidden;
        }

        /* Candlelight breathing glow */
        body::before {
            content: '';
            position: fixed;
            top: 50%;
            left: 50%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, var(--glow) 0%, transparent 68%);
            transform: translate(-50%, -50%);
            animation: breathe 12s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(0.93); }
            50%       { opacity: 1;   transform: translate(-50%, -50%) scale(1.07); }
        }

        .container {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 52px 28px 28px;
        }

        /* ── Date ── */
        .date {
            font-size: 10.5px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 18px;
            opacity: 0;
            animation: fadeUp 1.4s ease forwards 0.2s;
        }

        /* ── Hairline ── */
        .divider {
            width: 36px;
            height: 1px;
            background: var(--text-muted);
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeUp 1.4s ease forwards 0.45s;
        }

        /* ── Quote ── */
        .quote-wrap {
            max-width: 480px;
            width: 100%;
            text-align: center;
            margin-bottom: 46px;
            opacity: 0;
            animation: fadeUp 1.4s ease forwards 0.7s;
            transition: opacity 0.8s ease;
        }

        .quote-wrap.dimmed {
            opacity: 0.18 !important;
        }

        .quote {
            font-style: italic;
            font-size: 13px;
            line-height: 1.85;
            color: var(--text-dim);
        }

        .quote-author {
            font-size: 9.5px;
            letter-spacing: 0.18em;
            color: var(--text-muted);
            margin-top: 10px;
        }

        /* ── Viewing past banner ── */
        .viewing-banner {
            display: none;
            width: 100%;
            max-width: 640px;
            padding-bottom: 18px;
            font-size: 9.5px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .viewing-banner.visible {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 9.5px;
            letter-spacing: 0.18em;
            color: var(--accent);
            cursor: pointer;
            font-family: inherit;
            text-transform: uppercase;
            padding: 0;
            transition: opacity 0.25s;
        }

        .back-btn:hover { opacity: 0.65; }

        /* ── Editor ── */
        .editor-wrap {
            flex: 1;
            width: 100%;
            max-width: 640px;
            min-height: 0;
            display: flex;
            flex-direction: column;
            opacity: 0;
            animation: fadeUp 1.4s ease forwards 1s;
        }

        #editor {
            flex: 1;
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            resize: none;
            color: var(--text);
            font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif;
            font-size: 16.5px;
            line-height: 1.95;
            caret-color: var(--accent);
            overflow-y: auto;
            scrollbar-width: none;
        }

        #editor::-webkit-scrollbar { display: none; }

        #editor::placeholder {
            color: var(--text-muted);
            font-style: italic;
        }

        #editor[readonly] {
            cursor: default;
            opacity: 0.72;
        }

        /* ── Bottom bar ── */
        .bottom-bar {
            width: 100%;
            max-width: 640px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 18px;
            opacity: 0;
            animation: fadeUp 1.4s ease forwards 1.25s;
        }

        .save-status {
            font-size: 9.5px;
            letter-spacing: 0.14em;
            color: var(--text-muted);
            min-width: 40px;
        }

        .entries-btn {
            font-size: 9.5px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
            font-family: inherit;
            padding: 0;
            transition: color 0.3s;
        }

        .entries-btn:hover { color: var(--text-dim); }

        /* ── Past entries panel ── */
        .overlay {
            position: fixed;
            inset: 0;
            z-index: 99;
            display: none;
        }

        .overlay.active { display: block; }

        .panel {
            position: fixed;
            right: 0;
            top: 0;
            height: 100vh;
            width: 260px;
            background: var(--surface);
            border-left: 1px solid var(--text-muted);
            padding: 52px 32px;
            transform: translateX(100%);
            transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .panel::-webkit-scrollbar { display: none; }
        .panel.open { transform: translateX(0); }

        .panel-title {
            font-size: 9.5px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 28px;
        }

        .panel-close {
            position: absolute;
            top: 52px;
            right: 32px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            padding: 0;
            transition: color 0.25s;
            font-family: inherit;
        }

        .panel-close:hover { color: var(--text-dim); }

        .entry-item {
            padding: 13px 0;
            border-bottom: 1px solid var(--text-muted);
            cursor: pointer;
        }

        .entry-item:hover .entry-date { color: var(--text); }

        .entry-date {
            font-size: 10px;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            margin-bottom: 5px;
            transition: color 0.2s;
        }

        .entry-preview {
            font-size: 11px;
            color: var(--text-muted);
            font-style: italic;
            line-height: 1.5;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .no-entries {
            font-size: 12px;
            color: var(--text-muted);
            font-style: italic;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="date" id="dateDisplay"></div>
    <div class="divider"></div>

    <div class="quote-wrap" id="quoteWrap">
        <div class="quote" id="quoteText"></div>
        <div class="quote-author">— Marcus Aurelius, Meditations</div>
    </div>

    <div class="viewing-banner" id="viewingBanner">
        <span id="viewingDate"></span>
        <button class="back-btn" id="backBtn">Back to today</button>
    </div>

    <div class="editor-wrap">
        <textarea id="editor" placeholder="Begin writing…"></textarea>
    </div>

    <div class="bottom-bar">
        <span class="save-status" id="saveStatus"></span>
        <button class="entries-btn" id="entriesBtn">Past entries</button>
    </div>
</div>

<div class="overlay" id="overlay"></div>

<div class="panel" id="panel">
    <div class="panel-title">Your entries</div>
    <button class="panel-close" id="panelClose">×</button>
    <div id="entriesList"></div>
</div>

<script>
const QUOTES = [
    "You have power over your mind — not outside events. Realize this, and you will find strength.",
    "The impediment to action advances action. What stands in the way becomes the way.",
    "Waste no more time arguing about what a good man should be. Be one.",
    "Very little is needed to make a happy life; it is all within yourself, in your way of thinking.",
    "Accept the things to which fate binds you, and love the people with whom fate brings you together.",
    "Confine yourself to the present.",
    "If it is not right, do not do it; if it is not true, do not say it.",
    "The happiness of your life depends upon the quality of your thoughts.",
    "You could leave life right now. Let that determine what you do and say and think.",
    "Nowhere can man find a quieter or more untroubled retreat than in his own soul.",
    "The soul becomes dyed with the color of its thoughts.",
    "Be like the cliff against which the waves continually break; it stands firm and tames the fury of the water around it.",
    "Dwell on the beauty of life. Watch the stars, and see yourself running with them.",
    "Ask yourself at every moment, 'Is this necessary?'",
    "Receive without pride, relinquish without struggle.",
    "Loss is nothing else but change, and change is Nature's delight.",
    "Be tolerant with others and strict with yourself.",
    "Our life is what our thoughts make it.",
    "The first rule is to keep an untroubled spirit. The second is to look things in the face and know them for what they are.",
    "It is not death that a man should fear, but he should fear never beginning to live.",
    "Think of yourself as dead. You have lived your life. Now take what's left and live it properly.",
    "Everything we hear is an opinion, not a fact. Everything we see is a perspective, not the truth.",
    "It's time you realized that you have something in you more powerful and miraculous than the things that affect you.",
    "Do not indulge in dreams of what you have not, but count the blessings actually present.",
    "He who lives in harmony with himself lives in harmony with the universe.",
    "Never esteem anything as of advantage to you that will make you break your word or lose your self-respect.",
    "To live happily is an inward power of the soul.",
    "When you wake up in the morning, tell yourself: I will meet interference, ingratitude, arrogance. But I have seen the beauty of good.",
    "A man's life is a mere moment, his existence a flux, his perception clouded, his body's composition corruptible.",
    "The universe is change; life is opinion.",
    "Do not act as if you had ten thousand years to live.",
];

// ── Utilities ──────────────────────────────────────────

function todayKey() {
    return new Date().toISOString().split('T')[0];
}

function formatKey(str) {
    const [y, m, d] = str.split('-').map(Number);
    const dt = new Date(y, m - 1, d);
    const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    return `${DAYS[dt.getDay()]}, ${MONTHS[dt.getMonth()]} ${dt.getDate()} · ${y}`;
}

function storageKey(dateKey) { return 'stoic_entry_' + dateKey; }
function getIndex() { return JSON.parse(localStorage.getItem('stoic_index') || '[]'); }
function saveIndex(idx) { localStorage.setItem('stoic_index', JSON.stringify(idx)); }

function upsertIndex(key) {
    let idx = getIndex();
    if (!idx.includes(key)) { idx.push(key); idx.sort((a,b) => b.localeCompare(a)); saveIndex(idx); }
}

function dropFromIndex(key) {
    saveIndex(getIndex().filter(k => k !== key));
}

// ── State ──────────────────────────────────────────────

let viewingPast = false;
let saveTimer   = null;

// ── Elements ───────────────────────────────────────────

const dateDisplay  = document.getElementById('dateDisplay');
const quoteWrap    = document.getElementById('quoteWrap');
const quoteText    = document.getElementById('quoteText');
const editor       = document.getElementById('editor');
const saveStatus   = document.getElementById('saveStatus');
const entriesBtn   = document.getElementById('entriesBtn');
const overlay      = document.getElementById('overlay');
const panel        = document.getElementById('panel');
const panelClose   = document.getElementById('panelClose');
const entriesList  = document.getElementById('entriesList');
const viewingBanner= document.getElementById('viewingBanner');
const viewingDate  = document.getElementById('viewingDate');
const backBtn      = document.getElementById('backBtn');

// ── Init ───────────────────────────────────────────────

dateDisplay.textContent = formatKey(todayKey());

const doy = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 864e5);
quoteText.textContent = QUOTES[doy % QUOTES.length];

loadToday();
editor.focus();

// ── Load / Save ────────────────────────────────────────

function loadToday() {
    editor.value = localStorage.getItem(storageKey(todayKey())) || '';
    editor.readOnly = false;
    viewingBanner.classList.remove('visible');
    viewingPast = false;
}

function persist() {
    if (viewingPast) return;
    const key = todayKey();
    const val = editor.value;
    if (val.trim()) {
        localStorage.setItem(storageKey(key), val);
        upsertIndex(key);
    } else {
        localStorage.removeItem(storageKey(key));
        dropFromIndex(key);
    }
    saveStatus.textContent = 'saved';
    setTimeout(() => saveStatus.textContent = '', 2000);
}

editor.addEventListener('input', () => {
    if (viewingPast) return;
    clearTimeout(saveTimer);
    saveStatus.textContent = '·';
    saveTimer = setTimeout(persist, 900);
});

// Dim quote while actively typing; restore on idle
editor.addEventListener('focus', () => {
    if (editor.value.length > 0) quoteWrap.classList.add('dimmed');
});
editor.addEventListener('input', () => {
    quoteWrap.classList.add('dimmed');
});
editor.addEventListener('blur', () => {
    quoteWrap.classList.remove('dimmed');
});

// ── Panel ──────────────────────────────────────────────

function openPanel() {
    const idx = getIndex();
    entriesList.innerHTML = '';

    if (idx.length === 0) {
        entriesList.innerHTML = '<div class="no-entries">No past entries yet.</div>';
    } else {
        idx.forEach(key => {
            const text    = localStorage.getItem(storageKey(key)) || '';
            const preview = text.trim().slice(0, 58) + (text.length > 58 ? '…' : '');
            const item    = document.createElement('div');
            item.className = 'entry-item';
            item.innerHTML = `
                <div class="entry-date">${formatKey(key)}</div>
                <div class="entry-preview">${preview || '—'}</div>
            `;
            item.addEventListener('click', () => viewEntry(key));
            entriesList.appendChild(item);
        });
    }

    panel.classList.add('open');
    overlay.classList.add('active');
}

function closePanel() {
    panel.classList.remove('open');
    overlay.classList.remove('active');
}

function viewEntry(key) {
    closePanel();
    const today = todayKey();
    if (key === today) { loadToday(); return; }

    viewingPast = true;
    editor.value    = localStorage.getItem(storageKey(key)) || '';
    editor.readOnly = true;
    viewingDate.textContent = formatKey(key);
    viewingBanner.classList.add('visible');
    quoteWrap.classList.remove('dimmed');
}

entriesBtn.addEventListener('click', openPanel);
panelClose .addEventListener('click', closePanel);
overlay    .addEventListener('click', closePanel);
backBtn    .addEventListener('click', loadToday);

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closePanel();
});
</script>
</body>
</html>

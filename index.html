<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stoic Thoughts</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:         #090805;
            --surface:    #0f0d09;
            --text:       #c4a882;
            --text-dim:   #6b5a42;
            --text-muted: #38302a;
            --accent:     #9a7a52;
            --line:       #221e18;
            --glow:       rgba(180, 130, 60, 0.052);
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif;
            overflow: hidden;
        }

        /* Breathing background glow */
        body::before {
            content: '';
            position: fixed;
            top: 50%; left: 50%;
            width: 860px; height: 860px;
            background: radial-gradient(circle, var(--glow) 0%, transparent 66%);
            transform: translate(-50%, -50%);
            animation: breathe 13s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.45; transform: translate(-50%, -50%) scale(0.91); }
            50%       { opacity: 1;   transform: translate(-50%, -50%) scale(1.09); }
        }


        /* ══════════════════════════════════
           WRITE SCREEN
        ══════════════════════════════════ */

        .write-screen {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 36px 28px 24px;
            transition: opacity 0.35s ease;
        }

        .write-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* warm downward light spilling from candle over the content */
        .candle-light {
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 520px; height: 400px;
            background: radial-gradient(ellipse at 50% 8%,
                rgba(180, 120, 40, 0.10) 0%,
                rgba(180, 100, 20, 0.045) 38%,
                transparent 65%);
            pointer-events: none;
            z-index: 0;
            animation: breathe 13s ease-in-out infinite;
        }


        /* ── Candle (top-center, in-flow) ── */

        .candle {
            position: relative;
            z-index: 1;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 24px;
            opacity: 0;
            animation: fadeUp 1.3s ease forwards 0s;
        }

        .c-halo {
            position: absolute;
            bottom: 60px;
            width: 130px; height: 130px;
            border-radius: 50%;
            background: radial-gradient(circle,
                rgba(255, 148, 32, 0.20) 0%,
                rgba(255, 100, 10, 0.07) 48%,
                transparent 70%);
            animation:
                c-halo-a 0.47s ease-in-out infinite alternate,
                c-halo-b 0.73s ease-in-out infinite alternate;
        }

        @keyframes c-halo-a {
            from { opacity: 0.5; transform: scale(0.85); }
            to   { opacity: 1;   transform: scale(1.15); }
        }
        @keyframes c-halo-b {
            from { transform: scale(0.9) scaleX(0.95); }
            to   { transform: scale(1.1) scaleX(1.05); }
        }

        .c-flame {
            position: relative;
            width: 28px; height: 52px;
            margin-bottom: 4px;
            animation:
                c-sway-a 0.29s ease-in-out infinite alternate,
                c-sway-b 0.53s ease-in-out infinite alternate;
            transform-origin: bottom center;
        }

        @keyframes c-sway-a {
            from { transform: rotate(-2deg) scaleX(1); }
            to   { transform: rotate(2.5deg) scaleX(0.93); }
        }
        @keyframes c-sway-b {
            from { transform: rotate(1deg) scaleX(1.04); }
            to   { transform: rotate(-1.5deg) scaleX(0.96); }
        }

        .c-f-outer {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, #c84800, #f08200, #ffc840);
            border-radius: 50% 50% 28% 28% / 56% 56% 44% 44%;
            transform-origin: bottom center;
            animation: c-flick-a 0.51s ease-in-out infinite alternate;
        }

        @keyframes c-flick-a {
            0%   { transform: scaleY(1)    scaleX(1);    opacity: 0.92; }
            28%  { transform: scaleY(1.08) scaleX(0.91); opacity: 1;    }
            58%  { transform: scaleY(0.91) scaleX(1.07); opacity: 0.86; }
            100% { transform: scaleY(1.04) scaleX(0.96); opacity: 0.95; }
        }

        .c-f-mid {
            position: absolute;
            bottom: 0; left: 50%;
            width: 14px; height: 32px;
            background: linear-gradient(to top, #e87000, #ffcc00, #fff5a0);
            border-radius: 50% 50% 28% 28% / 58% 58% 42% 42%;
            transform-origin: bottom center;
            animation: c-flick-b 0.67s ease-in-out infinite alternate;
        }

        @keyframes c-flick-b {
            0%   { transform: translateX(-50%) scaleY(1);    }
            35%  { transform: translateX(-50%) scaleY(0.84); }
            70%  { transform: translateX(-50%) scaleY(1.14); }
            100% { transform: translateX(-50%) scaleY(0.93); }
        }

        .c-f-core {
            position: absolute;
            bottom: 7px; left: 50%;
            width: 7px; height: 17px;
            background: rgba(255, 252, 220, 0.88);
            border-radius: 50% 50% 40% 40%;
            animation: c-flick-c 0.41s ease-in-out infinite alternate;
        }

        @keyframes c-flick-c {
            from { transform: translateX(-50%) scaleY(1);    opacity: 0.88; }
            to   { transform: translateX(-50%) scaleY(0.76); opacity: 0.45; }
        }

        .c-wick {
            width: 2px; height: 9px;
            background: #3a2a14;
            flex-shrink: 0;
        }

        .c-body {
            width: 34px; height: 68px;
            background: linear-gradient(105deg, #1c1710 0%, #2c2318 45%, #201c12 100%);
            border-radius: 3px 3px 2px 2px;
            border: 1px solid #32291a;
            flex-shrink: 0;
        }


        /* ── Top bar ── */

        .top-bar {
            width: 100%; max-width: 640px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeUp 1.3s ease forwards 0.2s;
            position: relative; z-index: 1;
        }

        .date {
            font-size: 10.5px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .archive-btn {
            font-size: 10px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--text-muted);
            background: none; border: none;
            cursor: pointer; font-family: inherit; padding: 0;
            transition: color 0.3s;
        }
        .archive-btn:hover { color: var(--text-dim); }

        /* ── Divider ── */
        .divider {
            width: 36px; height: 1px;
            background: var(--text-muted);
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeUp 1.3s ease forwards 0.4s;
            position: relative; z-index: 1;
        }

        /* ── Quote ── */
        .quote-wrap {
            max-width: 480px; width: 100%;
            text-align: center;
            margin-bottom: 36px;
            opacity: 0;
            animation: fadeUp 1.3s ease forwards 0.65s;
            transition: opacity 0.9s ease;
            position: relative; z-index: 1;
        }
        .quote-wrap.dimmed { opacity: 0.15 !important; }

        .quote {
            font-style: italic;
            font-size: 13px; line-height: 1.9;
            color: var(--text-dim);
        }
        .quote-author {
            font-size: 9.5px; letter-spacing: 0.18em;
            color: var(--text-muted);
            margin-top: 10px;
        }

        /* ── Past-entry banner ── */
        .past-banner {
            display: none;
            width: 100%; max-width: 640px;
            padding-bottom: 14px;
            font-size: 9.5px; letter-spacing: 0.18em; text-transform: uppercase;
            color: var(--text-dim);
            position: relative; z-index: 1;
        }
        .past-banner.visible {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .back-btn {
            background: none; border: none;
            font-size: 9.5px; letter-spacing: 0.18em;
            color: var(--accent);
            cursor: pointer; font-family: inherit;
            text-transform: uppercase; padding: 0;
            transition: opacity 0.25s;
        }
        .back-btn:hover { opacity: 0.6; }

        /* ── Editor ── */
        .editor-wrap {
            flex: 1;
            width: 100%; max-width: 640px;
            min-height: 0;
            display: flex; flex-direction: column;
            opacity: 0;
            animation: fadeUp 1.3s ease forwards 0.95s;
            position: relative; z-index: 1;
        }

        #editor {
            flex: 1; width: 100%;
            background: transparent; border: none; outline: none; resize: none;
            color: var(--text);
            font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif;
            font-size: 16.5px; line-height: 1.95;
            caret-color: var(--accent);
            overflow-y: auto; scrollbar-width: none;
        }
        #editor::-webkit-scrollbar { display: none; }
        #editor::placeholder { color: var(--text-muted); font-style: italic; }
        #editor[readonly]    { cursor: default; opacity: 0.7; }

        /* ── Complete Reflection button ── */
        .finish-wrap {
            width: 100%; max-width: 640px;
            display: flex; justify-content: center;
            padding: 16px 0 6px;
            opacity: 0;
            animation: fadeUp 1.3s ease forwards 1.1s;
            transition: opacity 0.3s;
            position: relative; z-index: 1;
        }
        .finish-wrap.hidden-action { opacity: 0 !important; pointer-events: none; }

        .finish-btn {
            font-family: inherit;
            font-size: 10px; letter-spacing: 0.26em; text-transform: uppercase;
            color: var(--text-muted);
            background: none;
            border: 1px solid var(--line);
            padding: 9px 28px; cursor: pointer; border-radius: 1px;
            transition: color 0.35s, border-color 0.35s, opacity 0.35s;
        }
        .finish-btn:hover  { color: var(--text-dim); border-color: var(--text-muted); }
        .finish-btn:active { opacity: 0.5; }

        /* ── Bottom bar ── */
        .bottom-bar {
            width: 100%; max-width: 640px;
            display: flex; justify-content: flex-start;
            align-items: center;
            padding-top: 8px;
            opacity: 0;
            animation: fadeUp 1.3s ease forwards 1.2s;
            position: relative; z-index: 1;
        }
        .save-status {
            font-size: 9.5px; letter-spacing: 0.14em;
            color: var(--text-muted);
            min-width: 36px;
        }


        /* ══════════════════════════════════
           ARCHIVE SCREEN
        ══════════════════════════════════ */

        .archive-screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 40;
            display: flex; flex-direction: column;
            opacity: 0; pointer-events: none;
            transition: opacity 0.38s ease;
        }
        .archive-screen.visible { opacity: 1; pointer-events: all; }

        /* header */
        .archive-header {
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 44px 60px 24px;
        }

        .archive-title {
            font-size: 10px; letter-spacing: 0.24em;
            text-transform: uppercase;
            color: var(--text-dim);
        }
        .archive-count {
            font-size: 10px; letter-spacing: 0.14em;
            color: var(--text-muted);
            margin-left: 14px;
        }
        .archive-back {
            font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
            color: var(--accent);
            background: none; border: none;
            cursor: pointer; font-family: inherit; padding: 0;
            transition: opacity 0.25s;
        }
        .archive-back:hover { opacity: 0.6; }

        /* Marcus quote block */
        .archive-quote-block {
            flex-shrink: 0;
            padding: 32px 60px 30px;
            max-width: 860px; margin: 0 auto; width: 100%;
            text-align: center;
            border-top: 1px solid var(--line);
            border-bottom: 1px solid var(--line);
        }
        .archive-hero-quote {
            font-style: italic;
            font-size: 16px; line-height: 1.78;
            color: var(--text-dim);
            max-width: 500px; margin: 0 auto;
        }
        .archive-hero-attr {
            font-size: 9.5px; letter-spacing: 0.2em;
            color: var(--text-muted);
            margin-top: 12px;
        }

        /* scrollable entries */
        .archive-body {
            flex: 1;
            overflow-y: auto;
            padding: 48px 60px 80px;
            scrollbar-width: none;
        }
        .archive-body::-webkit-scrollbar { display: none; }

        .archive-inner {
            max-width: 640px; margin: 0 auto;
        }

        .arch-entry { margin-bottom: 52px; }

        .arch-date {
            font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--line);
        }
        .arch-text {
            font-size: 15.5px; line-height: 1.92;
            color: var(--text);
            white-space: pre-wrap;
            opacity: 0.82;
        }

        .archive-empty {
            font-size: 13px; color: var(--text-muted);
            font-style: italic; text-align: center;
            padding-top: 80px;
        }


        /* ══════════════════════════════════
           SHARED
        ══════════════════════════════════ */

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<!-- ── Write Screen ── -->
<div class="write-screen" id="writeScreen">

    <!-- warm downward candlelight -->
    <div class="candle-light"></div>

    <!-- candle (top-center, in-flow) -->
    <div class="candle">
        <div class="c-halo"></div>
        <div class="c-flame">
            <div class="c-f-outer"></div>
            <div class="c-f-mid"></div>
            <div class="c-f-core"></div>
        </div>
        <div class="c-wick"></div>
        <div class="c-body"></div>
    </div>

    <div class="top-bar">
        <div class="date" id="dateDisplay"></div>
        <button class="archive-btn" id="archiveOpenBtn">Archive of Thoughts</button>
    </div>

    <div class="divider"></div>

    <div class="quote-wrap" id="quoteWrap">
        <div class="quote" id="quoteText"></div>
        <div class="quote-author">— Marcus Aurelius, Meditations</div>
    </div>

    <div class="past-banner" id="pastBanner">
        <span id="pastDate"></span>
        <button class="back-btn" id="backBtn">← Back to today</button>
    </div>

    <div class="editor-wrap">
        <textarea id="editor" placeholder="Begin writing…"></textarea>
    </div>

    <div class="finish-wrap" id="finishWrap">
        <button class="finish-btn" id="finishBtn">Complete Reflection</button>
    </div>

    <div class="bottom-bar">
        <span class="save-status" id="saveStatus"></span>
    </div>

</div>


<!-- ── Archive Screen ── -->
<div class="archive-screen" id="archiveScreen">

    <div class="archive-header">
        <div>
            <span class="archive-title">Archive of Thoughts</span>
            <span class="archive-count" id="archiveCount"></span>
        </div>
        <button class="archive-back" id="archiveCloseBtn">← Write</button>
    </div>

    <div class="archive-quote-block">
        <div class="archive-hero-quote">
            The happiness of your life depends upon the quality of your thoughts.
        </div>
        <div class="archive-hero-attr">— Marcus Aurelius, Meditations</div>
    </div>

    <div class="archive-body">
        <div class="archive-inner" id="archiveInner"></div>
    </div>

</div>


<script>
// ── Quotes ───────────────────────────────────────────────────────────────────

const QUOTES = [
    "You have power over your mind — not outside events. Realize this, and you will find strength.",
    "The impediment to action advances action. What stands in the way becomes the way.",
    "Waste no more time arguing about what a good man should be. Be one.",
    "Very little is needed to make a happy life; it is all within yourself, in your way of thinking.",
    "Accept the things to which fate binds you, and love the people with whom fate brings you together.",
    "Confine yourself to the present.",
    "If it is not right, do not do it; if it is not true, do not say it.",
    "The happiness of your life depends upon the quality of your thoughts.",
    "You could leave life right now. Let that determine what you do and say and think.",
    "Nowhere can man find a quieter or more untroubled retreat than in his own soul.",
    "The soul becomes dyed with the color of its thoughts.",
    "Be like the cliff against which the waves continually break; it stands firm and tames the fury of the water around it.",
    "Dwell on the beauty of life. Watch the stars, and see yourself running with them.",
    "Ask yourself at every moment, 'Is this necessary?'",
    "Receive without pride, relinquish without struggle.",
    "Loss is nothing else but change, and change is Nature's delight.",
    "Be tolerant with others and strict with yourself.",
    "Our life is what our thoughts make it.",
    "The first rule is to keep an untroubled spirit. The second is to look things in the face and know them for what they are.",
    "It is not death that a man should fear, but he should fear never beginning to live.",
    "Think of yourself as dead. You have lived your life. Now take what's left and live it properly.",
    "Everything we hear is an opinion, not a fact. Everything we see is a perspective, not the truth.",
    "It's time you realized that you have something in you more powerful and miraculous than the things that affect you.",
    "Do not indulge in dreams of what you have not, but count the blessings actually present.",
    "He who lives in harmony with himself lives in harmony with the universe.",
    "Never esteem anything as of advantage to you that will make you break your word or lose your self-respect.",
    "To live happily is an inward power of the soul.",
    "When you wake up in the morning, tell yourself: I will meet interference, ingratitude, arrogance. But I have seen the beauty of good.",
    "A man's life is a mere moment, his existence a flux. Confine yourself to the present.",
    "The universe is change; life is opinion.",
    "Do not act as if you had ten thousand years to live.",
];

// ── Storage ──────────────────────────────────────────────────────────────────

const sKey  = d  => 'stoic_entry_' + d;
const today = () => new Date().toISOString().split('T')[0];

function getIndex() { return JSON.parse(localStorage.getItem('stoic_index') || '[]'); }
function setIndex(i) { localStorage.setItem('stoic_index', JSON.stringify(i)); }

function upsert(key) {
    const i = getIndex();
    if (!i.includes(key)) { i.push(key); i.sort((a,b) => b.localeCompare(a)); setIndex(i); }
}
function drop(key) { setIndex(getIndex().filter(k => k !== key)); }

function fmt(str) {
    const [y,m,d] = str.split('-').map(Number);
    const dt = new Date(y, m-1, d);
    const D = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const M = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    return `${D[dt.getDay()]}, ${M[dt.getMonth()]} ${dt.getDate()} · ${y}`;
}

function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Elements ─────────────────────────────────────────────────────────────────

const dateDisplay     = document.getElementById('dateDisplay');
const quoteWrap       = document.getElementById('quoteWrap');
const quoteText       = document.getElementById('quoteText');
const editor          = document.getElementById('editor');
const saveStatus      = document.getElementById('saveStatus');
const pastBanner      = document.getElementById('pastBanner');
const pastDate        = document.getElementById('pastDate');
const backBtn         = document.getElementById('backBtn');
const finishWrap      = document.getElementById('finishWrap');
const finishBtn       = document.getElementById('finishBtn');
const writeScreen     = document.getElementById('writeScreen');
const archiveOpenBtn  = document.getElementById('archiveOpenBtn');
const archiveScreen   = document.getElementById('archiveScreen');
const archiveCloseBtn = document.getElementById('archiveCloseBtn');
const archiveCount    = document.getElementById('archiveCount');
const archiveInner    = document.getElementById('archiveInner');

// ── State ────────────────────────────────────────────────────────────────────

let viewingPast = false;
let saveTimer   = null;

function setViewingPast(isPast) {
    viewingPast = isPast;
    editor.readOnly = isPast;
    finishWrap.classList.toggle('hidden-action', isPast);
    pastBanner.classList.toggle('visible', isPast);
}

// ── Init ─────────────────────────────────────────────────────────────────────

dateDisplay.textContent = fmt(today());

const doy = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 864e5);
quoteText.textContent = QUOTES[doy % QUOTES.length];

loadToday();
editor.focus();

// ── Write / Save ─────────────────────────────────────────────────────────────

function loadToday() {
    setViewingPast(false);
    editor.value = localStorage.getItem(sKey(today())) || '';
}

function persist() {
    if (viewingPast) return;
    const v = editor.value;
    const k = today();
    if (v.trim()) { localStorage.setItem(sKey(k), v); upsert(k); }
    else          { localStorage.removeItem(sKey(k)); drop(k); }
    saveStatus.textContent = 'saved';
    setTimeout(() => saveStatus.textContent = '', 1800);
}

// auto-save
editor.addEventListener('input', () => {
    if (viewingPast) return;
    clearTimeout(saveTimer);
    saveStatus.textContent = '·';
    saveTimer = setTimeout(persist, 900);
});

// dim quote while writing
editor.addEventListener('focus', () => { if (editor.value) quoteWrap.classList.add('dimmed'); });
editor.addEventListener('input', ()  => quoteWrap.classList.add('dimmed'));
editor.addEventListener('blur',  ()  => quoteWrap.classList.remove('dimmed'));

// ── Finish button ────────────────────────────────────────────────────────────

function finishEntry() {
    if (viewingPast) return;
    clearTimeout(saveTimer);

    if (!editor.value.trim()) {
        finishBtn.textContent = 'Nothing written yet';
        setTimeout(() => finishBtn.textContent = 'Complete Reflection', 1800);
        return;
    }

    persist();

    finishBtn.textContent = 'Reflection saved';
    finishBtn.style.color = 'var(--accent)';
    finishBtn.style.borderColor = 'var(--accent)';
    setTimeout(() => {
        finishBtn.textContent  = 'Complete Reflection';
        finishBtn.style.color  = '';
        finishBtn.style.borderColor = '';
    }, 2200);
}

finishBtn.addEventListener('click', finishEntry);

// ── Archive ───────────────────────────────────────────────────────────────────

function openArchive() {
    const idx = getIndex();
    archiveCount.textContent = idx.length ? `${idx.length} entr${idx.length === 1 ? 'y' : 'ies'}` : '';
    archiveInner.innerHTML   = '';

    if (idx.length === 0) {
        archiveInner.innerHTML = '<div class="archive-empty">Your reflections will appear here.</div>';
    } else {
        idx.forEach(key => {
            const text = (localStorage.getItem(sKey(key)) || '').trim();
            const el   = document.createElement('div');
            el.className = 'arch-entry';
            el.innerHTML = `
                <div class="arch-date">${fmt(key)}</div>
                <div class="arch-text">${escHtml(text)}</div>
            `;
            archiveInner.appendChild(el);
        });
    }

    archiveScreen.classList.add('visible');
    writeScreen.classList.add('hidden');
}

function closeArchive() {
    archiveScreen.classList.remove('visible');
    writeScreen.classList.remove('hidden');
}

archiveOpenBtn .addEventListener('click', openArchive);
archiveCloseBtn.addEventListener('click', closeArchive);
backBtn        .addEventListener('click', loadToday);

document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && archiveScreen.classList.contains('visible')) closeArchive();
});
</script>
</body>
</html>
